services:
  fontsync:
    build: .
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/fontsync.db
      STORAGE_BACKEND: filesystem
      FONT_STORAGE_PATH: /data/fonts
    volumes:
      - db_data:/data
      - font_data:/data/fonts
      - ./backend:/app/backend
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/backend"]

volumes:
  db_data:
  font_data:
