services:
  fontsync:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8070:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fontsync:${POSTGRES_PASSWORD}@db:5432/fontsync
      STORAGE_BACKEND: filesystem
      FONT_STORAGE_PATH: /data/fonts
    volumes:
      - font_data:/data/fonts
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fontsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fontsync
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fontsync"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  font_data:
  pg_data:
